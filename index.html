<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nelson's Links</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#111,#222,#000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:0 auto 20px;
    background:linear-gradient(45deg,#ff0050,#00f2ea);
}

h1{
    margin-bottom:10px;
}

p{
    opacity:.8;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:15px;
    font-size:18px;
    transition:.3s;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.08);
}

.btn:hover{
    transform:scale(1.05);
}

.footer{
    margin-top:25px;
    opacity:.6;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="profile"></div>

<h1>@nels.rm_</h1>

<p>Follow me on social media ✨</p>

<a class="btn" href="https://www.instagram.com/nels.rm_/" target="_blank">
📷 Instagram
</a>

<a class="btn" href="https://www.tiktok.com/@jnrm.7" target="_blank">
🎵 TikTok
</a>

<div class="footer">
Made with ❤️ by Nelson
</div>

</div>

</body>
</html>
